 <script>
 /* ==========================================================
   REUSABLE SUBJECT TEMPLATE DATA
    ========================================================== */
(function(){
  const SUBJECT_META = {
    title: "SUBJECT TITLE",
    subtitle: "Course subtitle goes here",
    shortName: "Subject App",
    description: "Reusable study app template with placeholder content ready for a new subject.",
    storageKey: "subject_template_revision_v1"
   };
 
  const TOPICS = [1,2,3,4].map(i => ({
    id:`t${i}`,
    title:`Topic ${i} (Date range placeholder)`
  }));
 
  const JOURNEY_TOPIC_STOPS = Object.freeze([
    { id:"t1", title:"Topic 1", years:"Range A", x:81.5, y:78.4, labelClass:"right" },
    { id:"t2", title:"Topic 2", years:"Range B", x:57.4, y:60.9, labelClass:"left" },
    { id:"t3", title:"Topic 3", years:"Range C", x:69.5, y:43.4, labelClass:"right" },
    { id:"t4", title:"Topic 4", years:"Range D", x:73.6, y:25.6, labelClass:"left" }
  ]);

  const placeholderImage = "./assets/placeholder-topic.svg";
  const timelineImage = "./assets/placeholder-timeline.svg";
  const infographicImage = "./assets/placeholder-lesson.svg";

  function makeTerms(topicNum){
    return Array.from({length:8}, (_,i)=>({
      term:`Topic ${topicNum} Term ${i+1}`,
      date:`Year ${topicNum}.${i+1}`,
      meaning:`Placeholder definition for Topic ${topicNum} Term ${i+1}. Replace this with subject-specific core knowledge.`,
      significance:`Placeholder significance for Topic ${topicNum} Term ${i+1}. Explain why this detail matters in the future subject.`
    }));
  }

  function makePeople(topicNum){
    return Array.from({length:6}, (_,i)=>({
      name:`Topic ${topicNum} Figure ${i+1}`,
      role:`Placeholder role for Topic ${topicNum} Figure ${i+1}.`,
      significance:`Placeholder significance for Topic ${topicNum} Figure ${i+1}.`
    }));
  }

  function makeEvents(topicNum){
    return Array.from({length:6}, (_,i)=>({
      name:`Topic ${topicNum} Event ${i+1}`,
      date:`Year ${topicNum}${i+1}`,
      what:`Placeholder summary for Topic ${topicNum} Event ${i+1}.`,
      whyMatters:`Placeholder explanation for why Topic ${topicNum} Event ${i+1} matters.`
    }));
  }

  const FACT_BANK = Object.fromEntries(TOPICS.map((topic, index)=>{
    const topicNum = index + 1;
    return [topic.id, {
      title:`${topicNum}. Topic ${topicNum}`,
      core:[
        { q:`What is the main focus of Topic ${topicNum}?`, a:`This is placeholder overview text for Topic ${topicNum}. Replace it with the real subject overview.`, tags:[`topic-${topicNum}`,"overview"] },
        { q:`Which debate should learners explore in Topic ${topicNum}?`, a:`Use this placeholder answer to describe a key debate, process, theme, or concept for Topic ${topicNum}.`, tags:[`topic-${topicNum}`,"debate"] }
      ],
      terms:makeTerms(topicNum),
      people:makePeople(topicNum),
      events:makeEvents(topicNum)
    }];
  }));
 
  const MCQ_BANK_MANUAL = TOPICS.flatMap((topic, index)=>{
    const topicNum = index + 1;
    return Array.from({length:12}, (_,i)=>({
      topicId:topic.id,
      q:`Topic ${topicNum} quiz question ${i+1}: which placeholder option is correct?`,
      choices:[`Topic ${topicNum} option A`,`Topic ${topicNum} option B`,`Topic ${topicNum} option C`,`Topic ${topicNum} option D`],
      answer:`Topic ${topicNum} option B`,
      explain:`Placeholder explanation for Topic ${topicNum} quiz question ${i+1}. Replace with the real explanation later.`
    }));
   });
 
  const TIMELINE_BANK = Object.fromEntries(TOPICS.map((topic, index)=>{
    const topicNum = index + 1;
    return [topic.id, Array.from({length:10}, (_,i)=>({
      label:`Topic ${topicNum} timeline milestone ${i+1}`,
      year: Number(`${topicNum}${String(i+1).padStart(2,'0')}`)
    }))];
  }));
 
  const CONNECTIONS_BANK = Object.fromEntries(TOPICS.map((topic, index)=>{
    const topicNum = index + 1;
    return [topic.id, {
      title:`${topicNum}. Topic ${topicNum}`,
      groups:Array.from({length:6}, (_,groupIndex)=>({
        label:`Topic ${topicNum} connection set ${groupIndex+1}`,
        terms:Array.from({length:4}, (_,termIndex)=>`Topic ${topicNum} link ${groupIndex+1}.${termIndex+1}`)
      }))
    }];
  }));
 
  const EMOJI_BANK = Object.fromEntries(TOPICS.map((topic, index)=>{
    const topicNum = index + 1;
    return [topic.id, {
      title:`Topic ${topicNum}`,
      sets:[
        { answer:`Topic ${topicNum} Concept 1`, emojis:["🧩","📝","📘"], clue:`Placeholder clue for Topic ${topicNum} Concept 1.` },
        { answer:`Topic ${topicNum} Concept 2`, emojis:["📅","🔍","💡"], clue:`Placeholder clue for Topic ${topicNum} Concept 2.` },
        { answer:`Topic ${topicNum} Concept 3`, emojis:["🏛️","⚙️","📈"], clue:`Placeholder clue for Topic ${topicNum} Concept 3.` }
      ]
    }];
  }));
 
  const MATCH_PEOPLE_DEFAULTS = Object.fromEntries(TOPICS.map((topic, index)=>{
    const topicNum = index + 1;
    return [topic.id, Array.from({length:4}, (_,i)=>({
      name:`Topic ${topicNum} Figure ${i+1}`,
      role:`Placeholder role ${i+1} for Topic ${topicNum}.`
    }))];
  }));
 
  const EXAM_BANK = TOPICS.flatMap((topic, index)=>{
    const topicNum = index + 1;
    return Array.from({length:3}, (_,i)=>({
      id:`e${topicNum}${i+1}`,
      topicId:topic.id,
      question:`Topic ${topicNum} exam question ${i+1}: assess the placeholder claim for this future subject.`,
      factors:[
        `Topic ${topicNum} factor A`,
        `Topic ${topicNum} factor B`,
        `Topic ${topicNum} factor C`,
        `Overall judgement`
      ],
      plan:[
        { title:"Intro", body:`Placeholder introduction guidance for Topic ${topicNum} exam question ${i+1}.` },
        { title:"Factor 1", body:`Placeholder paragraph guidance covering the first argument for Topic ${topicNum}.` },
        { title:"Factor 2", body:`Placeholder paragraph guidance covering the second argument for Topic ${topicNum}.` },
        { title:"Conclusion", body:`Placeholder conclusion guidance for Topic ${topicNum} exam question ${i+1}.` }
      ],
      help:[
        `Placeholder evidence point 1 for Topic ${topicNum}.`,
        `Placeholder evidence point 2 for Topic ${topicNum}.`,
        `Placeholder evidence point 3 for Topic ${topicNum}.`
      ]
    }));
  });
 
  const lessonThemesMaster = [
    { id:"political-authority", title:"Political Authority" },
    { id:"economic-development", title:"Economic Development" },
    { id:"opposition-control", title:"Opposition & Control" },
    { id:"social-cultural", title:"Social & Cultural Change" }
  ];

  function makeLesson(topicNum, topicId, theme, lessonNum){
    const lessonId = `${topicId}-${theme.id}-l${lessonNum}`;
    const lessonTitle = `Lesson ${lessonNum}`;
    const enquiry = `How does ${lessonTitle.toLowerCase()} develop Topic ${topicNum}'s placeholder enquiry?`;
    return {
      id:lessonId,
      keyQuestionId:lessonNum,
      keyQuestionTitle:`Key Question ${lessonNum}`,
      keyQuestionOverview:`Placeholder overview for ${lessonTitle} in Topic ${topicNum}. Replace this with the real enquiry framing and context.`,
      title:enquiry,
      topicId,
      themeId:theme.id,
      yearLabel:`Range ${topicNum}.${lessonNum}`,
      theme:theme.title,
      heroImage:placeholderImage,
      contentPack:{
        hero:{
          titleLine:`Placeholder introduction for ${lessonTitle} in Topic ${topicNum}.`,
          subtitleLine:enquiry
        },
        bigPicture:`Placeholder big-picture summary for ${lessonTitle}. Use this to explain the main concept, process, or debate in the future subject.`,
        sf:{
          briefings:[1,2,3,4].map(i=>({
            heading:`Micro-briefing ${i}: ${lessonTitle} focus ${i}`,
            text:`Placeholder briefing ${i} for ${lessonTitle} in Topic ${topicNum}. Replace with subject-specific teaching content while keeping this structure.`
          })),
          checks:[1,2,3,4].map(i=>({
            heading:`Context check ${i}`,
            prompt:`Which placeholder judgement best fits ${lessonTitle} focus ${i}?`,
            options:[
              `Incorrect placeholder option A for ${lessonTitle}`,
              `Correct placeholder option for ${lessonTitle} focus ${i}`,
              `Incorrect placeholder option C for ${lessonTitle}`,
              `Incorrect placeholder option D for ${lessonTitle}`
            ],
            correctIndex:1,
            feedbackCorrect:`Correct: this is the placeholder answer for ${lessonTitle} focus ${i}.`,
            feedbackWrong:`Not quite: replace this placeholder explanation with real feedback later.`
          }))
        },
        ambition:{
          briefings:[{
            heading:`Exam link: ${lessonTitle}`,
            text:`Placeholder exam-application note for ${lessonTitle}. Explain how this lesson's knowledge feeds into longer responses.`
          }]
        },
        quickCheck:{
          heading:`Quick Check`,
          prompt:`Which placeholder conclusion is strongest for ${lessonTitle}?`,
          options:[
            `Overstated placeholder conclusion`,
            `Balanced placeholder conclusion for ${lessonTitle}`,
            `Unsupported placeholder conclusion`,
            `Irrelevant placeholder conclusion`
          ],
          correctIndex:1,
          feedbackCorrect:`Good choice: this placeholder answer balances change and continuity.`,
          feedbackWrong:`Choose the option that is balanced and directly answers the enquiry.`
        },
        interpretations:{
          A:{
            text:`Extract A placeholder for ${lessonTitle}. Add a historian interpretation, source interpretation, or viewpoint here later.`,
            argIdentify:{
              prompt:`What is the main argument in Extract A for ${lessonTitle}?`,
              options:[`Option A`,`Option B`,`Option C`,`Option D`],
              correctIndex:1,
              feedbackCorrect:`Correct: this identifies the main argument.`,
              feedbackWrong:`Look for the option that captures the overall claim most directly.`
            },
            evidenceSupport:{
              selectionLimit:3,
              statements:[1,2,3,4].map(i=>({ id:`${lessonId}-as${i}`, text:`Support statement ${i} for ${lessonTitle}.`, score:i<3?2:1, feedback:`Placeholder feedback for support statement ${i}.` }))
            },
            evidenceChallenge:{
              selectionLimit:2,
              statements:[1,2,3,4].map(i=>({ id:`${lessonId}-ac${i}`, text:`Challenge statement ${i} for ${lessonTitle}.`, score:i<3?2:1, feedback:`Placeholder feedback for challenge statement ${i}.` }))
            }
          },
          B:{
            text:`Extract B placeholder for ${lessonTitle}. Replace with a contrasting interpretation or source judgement.`,
            argIdentify:{
              prompt:`What is the main argument in Extract B for ${lessonTitle}?`,
              options:[`Option A`,`Option B`,`Option C`,`Option D`],
              correctIndex:2,
              feedbackCorrect:`Correct: this identifies the contrast in Extract B.`,
              feedbackWrong:`Pick the option that contrasts with Extract A most clearly.`
            },
            evidenceSupport:{
              selectionLimit:3,
              statements:[1,2,3,4].map(i=>({ id:`${lessonId}-bs${i}`, text:`Alternative support statement ${i} for ${lessonTitle}.`, score:i<3?2:1, feedback:`Placeholder feedback for support statement ${i}.` }))
            },
            evidenceChallenge:{
              selectionLimit:2,
              statements:[1,2,3,4].map(i=>({ id:`${lessonId}-bc${i}`, text:`Alternative challenge statement ${i} for ${lessonTitle}.`, score:i<3?2:1, feedback:`Placeholder feedback for challenge statement ${i}.` }))
            }
          }
        },
        judgement:{
          options:[
            `Overstated placeholder judgement for ${lessonTitle}.`,
            `Balanced placeholder judgement for ${lessonTitle}.`,
            `Weak placeholder judgement for ${lessonTitle}.`,
            `Irrelevant placeholder judgement for ${lessonTitle}.`
          ],
          bestIndex:1,
          feedbackCorrect:`Strong judgement: this placeholder answer is balanced and defensible.`,
          feedbackWrong:`Choose the option that weighs more than one side of the argument.`,
          evidencePick:{
            selectionLimit:2,
            statements:[1,2,3,4,5].map(i=>({ id:`${lessonId}-j${i}`, text:`Judgement evidence ${i} for ${lessonTitle}.`, score:i<4?2:(i===4?1:-1), feedback:`Placeholder feedback for judgement evidence ${i}.` }))
          }
         }
       }
    };
  }
 
  const lessonsData = TOPICS.map((topic, index)=>{
    const topicNum = index + 1;
    return {
      id:topic.id,
      title:topic.title,
      topicOverview:{
        tension:`Placeholder tension for Topic ${topicNum}. Explain the central issue or debate here later.`,
        examWants:[
          `Placeholder exam skill 1 for Topic ${topicNum}.`,
          `Placeholder exam skill 2 for Topic ${topicNum}.`,
          `Placeholder exam skill 3 for Topic ${topicNum}.`
        ],
        pathway:lessonThemesMaster.map(theme=>theme.title)
      },
      themes:lessonThemesMaster.map(theme=>({
        id:theme.id,
        title:theme.title,
        lessons:[1,2].map(lessonNum=>makeLesson(topicNum, topic.id, theme, lessonNum))
      }))
    };
   });
 
  const LESSON_INFOGRAPHICS = Object.fromEntries(
    lessonsData.flatMap(topic => topic.themes.flatMap(theme => theme.lessons.map(lesson => [lesson.id, infographicImage])))
  );

  const TOPIC_TIMELINE_IMAGES = Object.fromEntries(TOPICS.map(topic => [topic.id, timelineImage]));

  window.SUBJECT_TEMPLATE_DATA = {
    SUBJECT_META,
    TOPICS,
    JOURNEY_TOPIC_STOPS,
    FACT_BANK,
    MCQ_BANK_MANUAL,
    TIMELINE_BANK,
    CONNECTIONS_BANK,
    EMOJI_BANK,
    MATCH_PEOPLE_DEFAULTS,
    EXAM_BANK,
    lessonsData,
    LESSON_INFOGRAPHICS,
    TOPIC_TIMELINE_IMAGES,
    lessonThemesMaster
  };
})();

const { SUBJECT_META, TOPICS, JOURNEY_TOPIC_STOPS, FACT_BANK, MCQ_BANK_MANUAL, TIMELINE_BANK, CONNECTIONS_BANK, EMOJI_BANK, MATCH_PEOPLE_DEFAULTS, EXAM_BANK, lessonsData, LESSON_INFOGRAPHICS, TOPIC_TIMELINE_IMAGES, lessonThemesMaster } = window.SUBJECT_TEMPLATE_DATA;

const TL_STATE = {
  topicId: null,
  size: 8,
  events: [],
  pool: [],
  placed: [],
  selectedPoolIdx: null,
  showDates: false,
  completed: false
};

function tlEnabledTopicsForSelect(){

 }
 
function tlPopulateSelect(){

  });
 }
 
function tlPickEvents(topicId, size){
  const bank = (TIMELINE_BANK[topicId] || []).slice();
  // Fallback: if missing, use a simple cross-topic set
  const fallback = [
    {label:"Milestone 1", year:101},
    {label:"Milestone 2", year:102},
    {label:"Milestone 3", year:103},
    {label:"Milestone 4", year:104},
    {label:"Milestone 5", year:105},
    {label:"Milestone 6", year:106},
    {label:"Milestone 7", year:107},
    {label:"Milestone 8", year:108},
    {label:"Milestone 9", year:109},
    {label:"Milestone 10", year:110},
  ];
  const src = bank.length ? bank : fallback;
 
  // If asking for more than available, just cap.
  const n = Math.min(size, src.length);
 
  // Shuffle and take n
  const shuffled = src
    .map(x=>({x, r:Math.random()}))
    .sort((a,b)=>a.r-b.r)
    .map(o=>o.x)
    .slice(0,n);
 
  return shuffled;
 }
 
function tlFormatYear(y){
  // y can include .MM or .MMDD-ish; keep human readable
  const year = Math.floor(y);
  const frac = y - year;
  if(frac <= 0) return String(year);
  // 2-digit month
  const mm = Math.round(frac * 100);
  if(mm >= 1 && mm <= 12) return `${year} (month ${String(mm).padStart(2,"0")})`;
  return String(year);
}
 
function tlRender(){
  const poolEl = $("timelinePool");
  const slotsEl = $("timelineSlots");
  const msgEl = $("timelineMsg");
  const checkBtn = $("btnCheckTimeline");
 
  if(!poolEl || !slotsEl || !msgEl || !checkBtn) return;
 
  // message
  msgEl.textContent = TL_STATE.completed
    ? "Perfect timeline. Dates unlocked."
    : (TL_STATE.placed.every(x=>x) ? "Ready to check." : "Select an event, then tap a slot to place it.");
 
  // pool chips
  poolEl.innerHTML = "";
  TL_STATE.pool.forEach((ev, i)=>{
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "tlChip" + (TL_STATE.selectedPoolIdx===i ? " isSelected" : "");
    chip.textContent = ev.label;
    chip.addEventListener("click", ()=>{
      if(TL_STATE.completed) return;
      TL_STATE.selectedPoolIdx = (TL_STATE.selectedPoolIdx===i) ? null : i;
      tlRender();
    });
    poolEl.appendChild(chip);
  });
 
  // slots
  slotsEl.innerHTML = "";
  TL_STATE.placed.forEach((ev, idx)=>{
    const li = document.createElement("li");
    const slot = document.createElement("div");
    slot.className = "tlSlot" + (!ev ? " empty" : "");
    if(ev && ev._wrong) slot.classList.add("isWrong");
 
    const btn = document.createElement("button");
    btn.type = "button";

    if(!ev){
      btn.innerHTML = `<span>Tap to place…</span><span class="tlDate"></span>`;
    }else{
      const dateHtml = (TL_STATE.showDates ? `<span class="tlDate">${tlFormatYear(ev.year)}</span>` : `<span class="tlDate"></span>`);
      btn.innerHTML = `<strong>${escapeHtml(ev.label)}</strong>${dateHtml}`;
    }

    btn.addEventListener("click", ()=>{
      if(TL_STATE.completed) return;
 
      // If slot occupied and no selection: remove to pool
      if(ev && TL_STATE.selectedPoolIdx===null){
        // remove
        const removed = TL_STATE.placed[idx];
        TL_STATE.placed[idx] = null;
        delete removed._wrong;
        TL_STATE.pool.push(removed);
        tlClearWrongMarks();
        tlRender();
        return;
      }
 
      // Place selected pool item into this slot
      const selIdx = TL_STATE.selectedPoolIdx;
      if(selIdx===null) return;
 
      const picked = TL_STATE.pool.splice(selIdx,1)[0];
 
      // If slot had an event, send it back to pool
      if(TL_STATE.placed[idx]){
        const old = TL_STATE.placed[idx];
        delete old._wrong;
        TL_STATE.pool.push(old);
      }
 
      TL_STATE.placed[idx] = picked;
      TL_STATE.selectedPoolIdx = null;
      tlClearWrongMarks();
      tlRender();
    });
 
    slot.appendChild(btn);
    li.appendChild(slot);
    slotsEl.appendChild(li);
  });
 
  // enable check only when all slots filled and not completed
  const filled = TL_STATE.placed.every(x=>!!x);
  checkBtn.disabled = !(filled && !TL_STATE.completed);
 }
 
function tlClearWrongMarks(){
  TL_STATE.placed.forEach(ev=>{ if(ev) delete ev._wrong; });
  const msgEl = $("timelineMsg");
  if(msgEl && !TL_STATE.completed) msgEl.textContent = "";
 }
 
function tlStart(){
  const sel = $("timelineTopicSelect");
  const sizeSel = $("timelineSize");
  const checkBtn = $("btnCheckTimeline");
  const win = $("tlWinOverlay");
  if(win) win.classList.add("hidden");
  if(checkBtn) checkBtn.disabled = true;

  TL_STATE.topicId = sel ? sel.value : (enabledTopicIds()[0] || null);
  TL_STATE.size = sizeSel ? Number(sizeSel.value || 8) : 8;

  if(!TL_STATE.topicId){
    TL_STATE.events = [];
    TL_STATE.pool = [];
    TL_STATE.placed = [];
    TL_STATE.selectedPoolIdx = null;
    TL_STATE.completed = false;
    const msgEl = $("timelineMsg");
    if(msgEl) msgEl.textContent = "Enable at least one topic to play Timeline Builder.";
    tlRender();
     return;
   }
 
  TL_STATE.events = tlPickEvents(TL_STATE.topicId, TL_STATE.size);
  TL_STATE.pool = TL_STATE.events
    .map(e=>({label:e.label, year:e.year}))
    .map(x=>({x, r:Math.random()}))
    .sort((a,b)=>a.r-b.r)
    .map(o=>o.x);
 
  TL_STATE.placed = Array.from({length: TL_STATE.pool.length}).map(()=>null);
  TL_STATE.selectedPoolIdx = null;
  TL_STATE.showDates = false;
  TL_STATE.completed = false;

  tlRender();
 }
 
function tlReset(){
  // keep same topic/size but reshuffle
  tlStart();
 }
 
function tlCheck(){
  const msgEl = $("timelineMsg");
  const win = $("tlWinOverlay");
 
  if(!TL_STATE.placed.every(x=>x)) return;

  // compute correct order by year asc
  const correct = TL_STATE.placed
    .slice()
    .map((ev, i)=>({ev, i}))
    .map(o=>o.ev)
    .slice()
    .sort((a,b)=>a.year-b.year)
    .map(ev=>ev.label);

  const current = TL_STATE.placed.map(ev=>ev.label);
  const isPerfect = current.every((lbl, i)=>lbl === correct[i]);

  if(isPerfect){
    TL_STATE.showDates = true;
    TL_STATE.completed = true;
    if(msgEl) msgEl.textContent = "Perfect timeline — dates unlocked.";
    if(win){
      win.classList.remove("hidden");
      setTimeout(()=>win.classList.add("hidden"), 1600);
     }
    confetti.burst(160);
    markGameSessionCompleted("timeline", TL_STATE.topicId);
  }else{
    // mark wrong slots
    TL_STATE.placed.forEach((ev, i)=>{
      ev._wrong = (ev.label !== correct[i]);
    });
    if(msgEl) msgEl.textContent = "Not quite — red slots are out of place. Adjust and try again.";
   }
 
  tlRender();
 }

      t = Math.imul(t ^ (t >>> 15), t | 1);

    }

  function buildBoard(topicKey){

    const rand = mulberry32(seed);
 
    // choose 4 groups from available (>=5)
    const pickedGroups = shuffle(topic.groups, rand).slice(0, 4);
 
    // flatten terms into tiles
    const tiles = [];

     });

const BEAT_CLOCK = {
  run: 0,
  best: Number(localStorage.getItem("beat_clock_best_run") || 0),
  timer: null,
  timeLeft: 20,
  active: false,
  correctTerms: new Set(),
  selected: new Set(),
  roundTopicId: null,
  terms: []
};
 
function bcAllTermsByTopic(){
  const map = {};
  Object.entries(FACT_BANK).forEach(([topicId, bank]) => {
    if(!isTopicEnabled(topicId)) return;
    const terms = (bank?.terms || []).map(t => String(t.term||"").trim()).filter(Boolean);
    map[topicId] = Array.from(new Set(terms));
  });
  return map;
 }

function bcSetMsg(msg){
  const el = document.getElementById("bcMsg");
  if(el) el.textContent = msg;
 }

function bcUpdatePills(){
  const timerPill = document.getElementById("bcTimerPill");
  const runPill = document.getElementById("bcRoundPill");
  const bestPill = document.getElementById("bcBestPill");
  if(timerPill) timerPill.textContent = `⏳ ${BEAT_CLOCK.timeLeft}s`;
  if(runPill) runPill.textContent = `Run: ${BEAT_CLOCK.run}`;
  if(bestPill) bestPill.textContent = `🏆 Best run: ${BEAT_CLOCK.best}`;
 }

function bcStopTimer(){
  if(BEAT_CLOCK.timer){
    clearInterval(BEAT_CLOCK.timer);
    BEAT_CLOCK.timer = null;
   }
 }

function bcRenderGrid(){
  const grid = document.getElementById("bcGrid");
  if(!grid) return;
  grid.innerHTML = "";

  BEAT_CLOCK.terms.forEach(term => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "bcTile";
    btn.textContent = term;
    if(BEAT_CLOCK.selected.has(term)) btn.classList.add("selected");
    if(!BEAT_CLOCK.active) btn.disabled = true;

    btn.addEventListener("click", ()=>{
      if(!BEAT_CLOCK.active) return;
      if(BEAT_CLOCK.selected.has(term)){
        BEAT_CLOCK.selected.delete(term);
      }else{
        if(BEAT_CLOCK.selected.size >= 4){
          bcSetMsg("Select only 4 terms.");
          return;
        }
        BEAT_CLOCK.selected.add(term);
      }
      bcRenderGrid();
    });

    grid.appendChild(btn);
  });

  const submit = document.getElementById("bcSubmitBtn");
  const clear = document.getElementById("bcClearBtn");
  if(submit) submit.disabled = !BEAT_CLOCK.active;
  if(clear) clear.disabled = !BEAT_CLOCK.active;
 }

function bcFailRun(reason){
  bcStopTimer();
  BEAT_CLOCK.active = false;
  BEAT_CLOCK.run = 0;
  bcUpdatePills();
  bcSetMsg(`${reason} Run reset — press Start run to try again.`);
  bcRenderGrid();
 }
 
function bcPickRound(){
  const byTopic = bcAllTermsByTopic();
  const topicIds = Object.keys(byTopic).filter(id => byTopic[id].length >= 8);
  if(!topicIds.length) return null;

  const topicId = topicIds[Math.floor(Math.random()*topicIds.length)];
  const topicTerms = shuffle(byTopic[topicId]).slice(0,4);
  if(topicTerms.length < 4) return null;

  const others = Object.entries(byTopic)
    .filter(([id]) => id !== topicId)
    .flatMap(([,terms]) => terms)
    .filter(t => !topicTerms.includes(t));
 
  if(others.length < 4) return null;
  const distractors = shuffle(Array.from(new Set(others))).slice(0,4);
  const mixed = shuffle([...topicTerms, ...distractors]);
  return { topicId, topicTerms, mixed };
}

function bcStartRound(){
  const round = bcPickRound();
  if(!round){
    bcSetMsg("Not enough terms to build Beat the Clock rounds.");
    return;
   }
 
  BEAT_CLOCK.roundTopicId = round.topicId;
  BEAT_CLOCK.correctTerms = new Set(round.topicTerms);
  BEAT_CLOCK.terms = round.mixed;
  BEAT_CLOCK.selected = new Set();
  BEAT_CLOCK.timeLeft = 20;
  BEAT_CLOCK.active = true;

  const t = TOPICS.find(x=>x.id===round.topicId);
  const topicPill = document.getElementById("bcTopicPill");
  const prompt = document.getElementById("bcPrompt");
  const title = t ? t.title : round.topicId;
  if(topicPill) topicPill.textContent = `Topic: ${title}`;
  if(prompt) prompt.textContent = `Find the 4 matching terms: ${title}`;

  bcUpdatePills();
  bcSetMsg("Go! Pick 4 and lock them in before the timer ends.");
  bcRenderGrid();

  bcStopTimer();
  BEAT_CLOCK.timer = setInterval(()=>{
    BEAT_CLOCK.timeLeft--;
    bcUpdatePills();
    if(BEAT_CLOCK.timeLeft <= 0){
      bcFailRun("⏰ Time up!");
     }
  }, 1000);
 }

function bcSubmit(){
  if(!BEAT_CLOCK.active) return;
  if(BEAT_CLOCK.selected.size !== 4){
    bcSetMsg("Select exactly 4 terms first.");
    return;
  }
  const ok = [...BEAT_CLOCK.selected].every(t => BEAT_CLOCK.correctTerms.has(t));
  if(!ok){
    bcFailRun("❌ Wrong set.");
    return;
  }

  bcStopTimer();
  BEAT_CLOCK.run += 1;
  if(BEAT_CLOCK.run > BEAT_CLOCK.best){
    BEAT_CLOCK.best = BEAT_CLOCK.run;
    localStorage.setItem("beat_clock_best_run", String(BEAT_CLOCK.best));
  }
  bcUpdatePills();
  bcSetMsg(`✅ Nice! Round ${BEAT_CLOCK.run} cleared. Next round...`);
  setTimeout(()=>{
    if(BEAT_CLOCK.run > 0) bcStartRound();
  }, 700);
 }

  const startBtn = document.getElementById("btnStartBeatClock");

      snakeCloseQuestionDialog();
      onDone?.();
    }
  }, 1000);
 }
 
function snakeStartTicker(){
  if(SNAKE_QUIZ.timer) clearInterval(SNAKE_QUIZ.timer);
  SNAKE_QUIZ.timer = setInterval(snakeTick, SNAKE_QUIZ.tickMs);
 }
 
function snakeStopTicker(){
  if(!SNAKE_QUIZ.timer) return;
  clearInterval(SNAKE_QUIZ.timer);
  SNAKE_QUIZ.timer = null;
}
 
function snakePool(topicId){
  return getQuizPool(topicId).filter(q=>Array.isArray(q.choices) && q.choices.length >= 3);
}
 
function snakeNewQuestion(){
  const pool = snakePool(SNAKE_QUIZ.topicId);
  if(!pool.length){
    SNAKE_QUIZ.q = null;
    snakeSetMsg("Pick another topic and start again.");
    snakeStop();
    return false;
   }
 
  const pick = pool[Math.floor(Math.random()*pool.length)];
  const distractors = shuffle(pick.choices.filter(c=>c!==pick.answer)).slice(0,2);
  const top3 = shuffle([pick.answer, ...distractors]);
  const answerIdx = top3.findIndex(c=>c===pick.answer);
  const letters = ["A","B","C"];
  const occupied = new Set(SNAKE_QUIZ.snake.map(p=>`${p.x},${p.y}`));
  const available = [];
  for(let y=0;y<SNAKE_QUIZ.board;y++){
    for(let x=0;x<SNAKE_QUIZ.board;x++){
      const key = `${x},${y}`;
      if(!occupied.has(key)) available.push({x,y});
    }
   }
  if(available.length < 3){
    snakeSetMsg("Board full — huge run. Starting fresh.");
    snakeStart();
    return false;
  }

  const spots = shuffle(available).slice(0,3);
  SNAKE_QUIZ.q = {
    prompt: pick.q,
    answerIdx,
    cells: spots.map((pos, idx)=>({ ...pos, letter:letters[idx], idx, choice:top3[idx] }))
  };
  return true;
 }
 
function snakeDraw(){
  const canvas = snakeEl("snakeQuizCanvas");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  if(!ctx) return;
  const size = canvas.width;
  const cell = size / SNAKE_QUIZ.board;
 
  ctx.clearRect(0,0,size,size);
  ctx.fillStyle = "#f4f9ff";
  ctx.fillRect(0,0,size,size);
  ctx.strokeStyle = "rgba(22,45,91,.08)";
  ctx.lineWidth = 1;
  for(let i=0;i<=SNAKE_QUIZ.board;i++){
    const p = Math.round(i*cell)+0.5;
    ctx.beginPath(); ctx.moveTo(p,0); ctx.lineTo(p,size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,p); ctx.lineTo(size,p); ctx.stroke();
  }
 
  if(SNAKE_QUIZ.q){
    SNAKE_QUIZ.q.cells.forEach(c=>{
      const x = c.x*cell, y = c.y*cell;
      const correct = c.idx === SNAKE_QUIZ.q.answerIdx;
      ctx.fillStyle = correct ? "rgba(126,185,170,.32)" : "rgba(183,142,161,.22)";
      ctx.fillRect(x+2,y+2,cell-4,cell-4);
      ctx.strokeStyle = correct ? "rgba(126,185,170,.95)" : "rgba(183,142,161,.95)";
      ctx.strokeRect(x+2,y+2,cell-4,cell-4);
      ctx.fillStyle = "#11233a";
      ctx.font = `${Math.floor(cell*0.46)}px Inter, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(c.letter, x + cell/2, y + cell/2);
    });
  }
 
  SNAKE_QUIZ.snake.forEach((p, idx)=>{
    const x = p.x*cell, y = p.y*cell;
    ctx.fillStyle = idx===0 ? "#4f7fc2" : "#6e90ca";
    ctx.fillRect(x+2,y+2,cell-4,cell-4);
  });
 }

function snakeUpdateHud(){
  snakeEl("snakeQuizLenPill").textContent = `Length: ${SNAKE_QUIZ.snake.length || 0}`;
  snakeEl("snakeQuizScorePill").textContent = `Correct: ${SNAKE_QUIZ.score}`;
  snakeEl("snakeQuizBestPill").textContent = `🏆 Best length: ${SNAKE_QUIZ.best}`;
 }

function snakeStop(){
  snakeStopTicker();
  snakeCloseQuestionDialog();
  SNAKE_QUIZ.running = false;
 }
 
function snakeGameOver(reason){
  snakeStop();
  snakeSetMsg(`${reason} Final length ${SNAKE_QUIZ.snake.length}. Press Start run to play again.`);
}
 
function snakeTick(){
  if(!SNAKE_QUIZ.running) return;
  SNAKE_QUIZ.dir = { ...SNAKE_QUIZ.nextDir };
  const head = SNAKE_QUIZ.snake[0];
  const next = { x: head.x + SNAKE_QUIZ.dir.x, y: head.y + SNAKE_QUIZ.dir.y };
 
  if(next.x < 0 || next.y < 0 || next.x >= SNAKE_QUIZ.board || next.y >= SNAKE_QUIZ.board){
    snakeGameOver("🧱 You hit a wall.");
    return;
  }
  if(SNAKE_QUIZ.snake.some(s=>s.x===next.x && s.y===next.y)){
    snakeGameOver("🌀 You ran into your tail.");
    return;
  }
 
  let ate = null;
  if(SNAKE_QUIZ.q) ate = SNAKE_QUIZ.q.cells.find(c=>c.x===next.x && c.y===next.y) || null;
  SNAKE_QUIZ.snake.unshift(next);
 
  if(ate){
    if(ate.idx === SNAKE_QUIZ.q.answerIdx){
      SNAKE_QUIZ.score += 1;
      if(SNAKE_QUIZ.snake.length > SNAKE_QUIZ.best){
        SNAKE_QUIZ.best = SNAKE_QUIZ.snake.length;
        localStorage.setItem("snake_quiz_best_length", String(SNAKE_QUIZ.best));
      }
      snakeSetMsg("✅ Correct! Review the next question in the pop-up.");
      snakeUpdateHud();
      if(!snakeNewQuestion()) return;
      snakeDraw();
      snakeStopTicker();
      snakeShowQuestionDialog(()=>{
        if(!SNAKE_QUIZ.running) return;
        snakeSetMsg("Run resumed. Eat the correct A/B/C tile.");
        snakeStartTicker();
      });
      return;
    }else{
      snakeGameOver(`❌ Wrong — ${ate.letter} was incorrect.`);
      return;
     }
  }else{
    SNAKE_QUIZ.snake.pop();
  }

  snakeUpdateHud();
  snakeDraw();
}

function snakeSetDirection(dx,dy){
  if(!SNAKE_QUIZ.running) return;
  const cur = SNAKE_QUIZ.dir;
  if(cur.x === -dx && cur.y === -dy) return;
  SNAKE_QUIZ.nextDir = {x:dx,y:dy};
}

const DAILY_ACTIVITY_TARGETS = { lesson:1, study:10, quiz:1, game:1 };
const DAILY_TYPES = ["lesson","study","quiz","game"];
const DAILY_TASK_COUNT = 3;
 
let NEXT_QUIZ_FROM_DAILY_CHALLENGE = false;
 
function pad2(n){ return String(n).padStart(2,'0'); }
function todayKey(){
   const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
 }
function keyToDate(k){
  // k = YYYY-MM-DD
  const [y,m,dd] = String(k).split('-').map(n=>parseInt(n,10));
  return new Date(y, (m||1)-1, dd||1);
 }
function isSameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
 }
function addDaysKey(k, delta){
  const d = keyToDate(k);
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
 }
function yesterdayKey(){
  return addDaysKey(todayKey(), -1);
 }
function dayOfYear(d){
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / 86400000);
 }
function dailyIndex(){ return dayOfYear(new Date()); }
function getDailyTopicId(){
  const current = getCurrentJourneyTopicId();
  if(current && isTopicEnabled(current)) return current;
  return enabledTopicIds()[0] || null;
 }
function getActiveDailyTopicId(){
  return ensureDaily().topicId;
 }
function dailyActivityLabel(type){
  if(type === "lesson") return "Lesson";
  if(type === "study") return "Study Cards";
  if(type === "quiz") return "Quiz";
  if(type === "game") return "Game";
  return "Activity";
 }
function isJourneyStudyMode(mode){
  return mode === "journey" || mode === "study";
}
function isJourneyCardComplete(cardId){
  if(!cardId) return false;
  STATE.journey ||= { completedCards:{}, completedQuizQuestions:{} };
  STATE.journey.completedCards ||= {};
  return !!STATE.journey.completedCards[cardId];
}
function markJourneyCardComplete(cardId){
  if(!cardId) return;

  STATE.journey.completedCards ||= {};
  STATE.journey.completedQuizQuestions ||= {};

}
function isJourneyQuizQuestionComplete(question){

}
function markJourneyQuizQuestionComplete(question){

}
function getJourneyCardsForTopic(topicId){
  return ALL_CARDS.filter(c=>c.topicId===topicId && isTopicEnabled(c.topicId) && !isJourneyCardComplete(c.id));
}
function getJourneyStudyStats(topicId){
  const topicCards = ALL_CARDS.filter(c=>c.topicId===topicId);
  const total = topicCards.length;
  const done = topicCards.reduce((count, card)=>count + (isJourneyCardComplete(card.id) ? 1 : 0), 0);
  const remaining = Math.max(0, total - done);
  return { total, done, remaining };
}
function isDailyActivityDone(activity){
  if(activity?.type === "quiz"){
    return Number(activity?.bestPercent||0) >= 100;
   }
  return Number(activity?.progress||0) >= Number(activity?.target||1);
}
function topicHasLessonRemaining(topicId){
  const topic = lessonsData.find(t=>t.id===topicId);
  if(!topic) return false;
  return getTopicLessons(topic).some(lesson=>getLessonJourneyState(lesson.id) !== "completed");
}
function topicHasStudyRemaining(topicId){
  return getJourneyCardsForTopic(topicId).length > 0;
}
function topicHasQuizRemaining(topicId){
  return getJourneyQuizPool(topicId).length > 0;
}
function topicHasGameRemaining(topicId){
  const s = touchTopicStats(topicId);
  return Number(s.gameCompletions||0) < 1;
}
function isDailyTypeValidForTopic(type, topicId){
  if(type === "lesson") return topicHasLessonRemaining(topicId);
  if(type === "study") return topicHasStudyRemaining(topicId);
  if(type === "quiz") return topicHasQuizRemaining(topicId);
  if(type === "game") return topicHasGameRemaining(topicId);
  return false;
}
function getDailyStudyTarget(topicId){
  const remaining = getJourneyCardsForTopic(topicId).length;
  if(remaining <= 0) return 0;
  return Math.min(DAILY_ACTIVITY_TARGETS.study||10, remaining);
}
function buildDailyActivities(topicId, prevCombo){
  const preferred = DAILY_TYPES.filter(type=>isDailyTypeValidForTopic(type, topicId));
  const lessonAvailable = topicHasLessonRemaining(topicId);
  const fallbackPool = DAILY_TYPES.filter(type=>type !== "lesson" || lessonAvailable);
  const pool = (preferred.length >= DAILY_TASK_COUNT ? preferred : fallbackPool).slice();
 
  const seedBase = `${todayKey()}|${topicId}|${prevCombo||""}`;
  let seed = 2166136261;
  for(let i=0;i<seedBase.length;i++){
    seed ^= seedBase.charCodeAt(i);
    seed = Math.imul(seed, 16777619);
   }
  const rand = ()=>{
    seed += 0x6D2B79F5;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
 
  for(let i=pool.length-1;i>0;i--){
    const j = Math.floor(rand() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
   }
 
  const selected = pool.slice(0, Math.min(DAILY_TASK_COUNT, pool.length));
  return selected.map(type=>({ type, target:(type === "study" ? getDailyStudyTarget(topicId) : (DAILY_ACTIVITY_TARGETS[type]||1)), progress:0, completed:false, label:dailyActivityLabel(type) }));
}
function syncDailyActivityProgress(daily){
  if(!daily || !Array.isArray(daily.activities)) return;
  const topicId = daily.topicId;
  daily.activities.forEach(activity=>{
    if(!activity || !activity.type) return;
    if(activity.type === "lesson"){
      const topic = lessonsData.find(t=>t.id===topicId);
      const lessons = topic ? getTopicLessons(topic) : [];
      const done = lessons.reduce((n,l)=>n + (getLessonJourneyState(l.id) === "completed" ? 1 : 0), 0);
      activity.progress = Math.min(activity.target||1, done > 0 ? 1 : 0);
    }else if(activity.type === "study"){
      activity.progress = Math.min(activity.target||10, Number(activity.progress||0));
    }else if(activity.type === "quiz"){
      const stats = topicQuizStats(topicId);
      activity.bestPercent = Math.max(Number(activity.bestPercent||0), Number(stats.quizBestPercent||0));
      activity.progress = Number(activity.bestPercent||0) >= 100 ? Number(activity.target||1) : 0;
    }else if(activity.type === "game"){
      const stats = touchTopicStats(topicId);
      activity.progress = Math.min(activity.target||1, Number(stats.gameCompletions||0) > 0 ? 1 : 0);
    }
    activity.completed = isDailyActivityDone(activity);
  });
}
function getDailyExamId(topicId){
  const list = EXAM_BANK.filter(x=>x.topicId===topicId);
  if(!list.length) return null;
  return list[dailyIndex() % list.length].id;
 }
 
function ensureDaily(){
  STATE.daily ||= {};
  const k = todayKey();
  const wantTopic = getDailyTopicId();
  const enabled = enabledTopicIds();
  const VALID_DAILY_TYPES = new Set(["lesson","study","quiz","game"]);
 
  const migrateLegacy = (row)=>{
    if(!row || typeof row !== "object") return null;
    if(Array.isArray(row.activities)) return row;
    const activities = [];
    if(row.flash != null){
      activities.push({ type:"study", target:Math.max(1, getDailyStudyTarget(row.topicId || wantTopic)), progress:Math.min(Math.max(1, getDailyStudyTarget(row.topicId || wantTopic)), Number(row.flash||0)), completed:Number(row.flash||0) >= Math.max(1, getDailyStudyTarget(row.topicId || wantTopic)), label:"Study Cards" });
    }
    if(Number(row.quizBest||0) > 0){
      activities.push({ type:"quiz", target:1, progress:Number(row.quizBest||0) >= 100 ? 1 : 0, completed:Number(row.quizBest||0) >= 100, label:"Quiz" });
     }
    return {
      topicId: row.topicId,
      activities: activities.slice(0,DAILY_TASK_COUNT),
      comboKey: row.comboKey || null,
      completed: !!row.completed,
      migratedAt: Date.now()
    };
  };

  const hasValidTopic = (topicId)=> !!(topicId && TOPICS.some(t=>t.id===topicId));
  const hasValidActivities = (activities)=> Array.isArray(activities)
    && activities.length > 0
    && activities.every(a=>a && a.type && VALID_DAILY_TYPES.has(a.type));
  const sanitizeActivities = (activities)=> Array.isArray(activities)
    ? activities.filter(a=>a && a.type && VALID_DAILY_TYPES.has(a.type))
    : [];
  const rebuildDaily = (topicId, prevCombo)=>{
    const nextTopic = hasValidTopic(topicId) ? topicId : wantTopic;
    let activities = sanitizeActivities(buildDailyActivities(nextTopic, prevCombo));
    if(!activities.length) activities = sanitizeActivities(buildDailyActivities(nextTopic, null));
    return {
      topicId: nextTopic,
      activities,
      comboKey: activities.map(a=>a.type).sort().join("+") || null,
      completed: false
    };
  };

  let daily = migrateLegacy(STATE.daily[k]);
  if(!daily) daily = { topicId: wantTopic, activities:[], comboKey:null, completed:false };

  const rowIsValid = hasValidTopic(daily.topicId) && hasValidActivities(daily.activities);
  if(!enabled.includes(daily.topicId)) daily.topicId = wantTopic;
  if(!rowIsValid || daily.topicId !== wantTopic){
    const prev = STATE.daily[addDaysKey(k,-1)];
    const prevCombo = Array.isArray(prev?.activities) ? prev.activities.map(a=>a.type).sort().join("+") : null;
    daily = rebuildDaily(wantTopic, prevCombo);
   }
 
  syncDailyActivityProgress(daily);
  daily.completed = daily.activities.length > 0 && daily.activities.every(isDailyActivityDone);
  STATE.daily[k] = daily;
  saveState();
  return STATE.daily[k];
 }
 

function normalizeDailyStreak(){
  // Duolingo-style: streak remains “alive” if last completion was yesterday.
  STATE.dailyStreak ||= { count:0, best:0, lastDate:null };
  const last = STATE.dailyStreak.lastDate;
  if(!last){
    // Migration / safety: infer last completion from daily log if available
    try{
      const keys = Object.keys(STATE.daily||{}).sort();
      let inferred = null;
      for(let i=keys.length-1;i>=0;i--){
        const k = keys[i];
        if(STATE.daily[k]?.completed){ inferred = k; break; }
      }
      if(inferred){
        STATE.dailyStreak.lastDate = inferred;
        // Compute streak backwards (in case user has a run already)
        let count = 0;
        let cur = inferred;
        while(STATE.daily[cur]?.completed){
          count++;
          cur = addDaysKey(cur, -1);
        }
        STATE.dailyStreak.count = count;
        STATE.dailyStreak.best = Math.max(STATE.dailyStreak.best||0, count);
        saveState();
        return;
       }
    }catch(e){}
    STATE.dailyStreak.count = 0;
    STATE.dailyStreak.best = Math.max(STATE.dailyStreak.best||0, 0);
    saveState();
    return;
   }
  const t = todayKey();
  const y = yesterdayKey();
  if(last === t || last === y) return; // still valid
  // Missed at least one full day → streak breaks
  STATE.dailyStreak.count = 0;
  STATE.dailyStreak.best = Math.max(STATE.dailyStreak.best||0, 0);
  STATE.dailyStreak.lastDate = null;
  saveState();
}
 
function updateDailyStreakOnComplete(){
  STATE.dailyStreak ||= { count:0, best:0, lastDate:null };
  const t = todayKey();
  const last = STATE.dailyStreak.lastDate;
  if(last === t) return; // already counted today

function startOfTodayTs(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.getTime();
 }
function addDaysTs(startTs, days){
  const d = new Date(startTs);
  d.setDate(d.getDate()+days);
  d.setHours(0,0,0,0);
  return d.getTime();
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function unique(arr){
  const seen=new Set(), out=[];
  for(const x of arr){
    const k=String(x).toLowerCase();
    if(seen.has(k)) continue;
    seen.add(k);
    out.push(x);
  }
  return out;
}
function debounce(fn, ms){
  let t;
  return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), ms); };
 }
 
/* ==========================================================
   ISO WEEK KEY (weekly badge)
   ========================================================== */
function getISOWeekKey(date = new Date()){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  const year = d.getUTCFullYear();
  return `${year}-W${String(weekNo).padStart(2,"0")}`;
}
function getWeeklyBucket(){
  const key = getISOWeekKey(new Date());
  STATE.weekly[key] ||= { attempted:0, correct:0, bestStreak:0 };
  return { key, bucket: STATE.weekly[key] };
}
function weeklyPercent(){
  const { bucket } = getWeeklyBucket();
  if(bucket.attempted<=0) return 0;
  return Math.round((bucket.correct/bucket.attempted)*100);
}
function getWeeklyBadge(){
  const { bucket } = getWeeklyBucket();
  const enough = bucket.attempted >= 10;
  if(!enough) return { name:"—", icon:"🏅", note:"Do 10 quiz Qs this week to unlock." };
  const pct = weeklyPercent();
  if(pct>=90) return { name:"Diamond", icon:"💎", note:"90%+ this week." };
  if(pct>=80) return { name:"Gold", icon:"🥇", note:"80–89% this week." };
  if(pct>=65) return { name:"Silver", icon:"🥈", note:"65–79% this week." };
  return { name:"Bronze", icon:"🥉", note:"<65% this week — Focus then Mixed." };
 }
 
/* ==========================================================
   CONFETTI (lightweight)
   ========================================================== */
const confetti = (() => {
  const canvas = document.getElementById("confettiCanvas");
  const ctx = canvas.getContext("2d");
  let W=0,H=0,pieces=[],running=false;

  function resize(){
    W = canvas.width = window.innerWidth * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
   }
  window.addEventListener("resize", resize);
 
  function spawn(count=110){
    resize();
    const colors = [
      [110,144,202],[163,194,223],[126,185,170],[158,183,212],[183,142,161]
    ];
    pieces = Array.from({length:count}).map(()=> {
      const c = colors[Math.floor(Math.random()*colors.length)];
      return {
        x: Math.random()*W,
        y: -20*Math.random()*devicePixelRatio,
        r: (4+Math.random()*7)*devicePixelRatio,
        vx: (-2 + Math.random()*4)*devicePixelRatio,
        vy: (3 + Math.random()*6)*devicePixelRatio,
        rot: Math.random()*Math.PI,
        vr: (-0.2 + Math.random()*0.4),
        c,
        life: 110 + Math.random()*40
      };
    });
  }
  function tick(){
    if(!running) return;
    ctx.clearRect(0,0,W,H);
    pieces.forEach(p=>{
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.vy += 0.03*devicePixelRatio;
      p.life--;
 
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = `rgba(${p.c[0]},${p.c[1]},${p.c[2]},0.9)`;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r*0.6);
      ctx.restore();
    });
    pieces = pieces.filter(p=>p.life>0 && p.y < H+50*devicePixelRatio);
    if(pieces.length===0){ running=false; ctx.clearRect(0,0,W,H); return; }
    requestAnimationFrame(tick);
  }
  function burst(count=110){
    spawn(count);
    running=true;
    requestAnimationFrame(tick);
  }
  function fall(durationMs=2600){
    const count = Math.max(120, Math.floor(window.innerWidth / 7));
    burst(count);
    const interval = setInterval(()=>spawn(count), 420);
    setTimeout(()=>clearInterval(interval), Math.max(600, durationMs));
  }
  return { burst, fall };
})();

function normalizePct(value){
  return Number.isFinite(value) ? Math.max(0, Math.min(100, Math.round(value))) : null;
 }
 
function buildBreakdownPart(part, config){
  if(part == null) return null;
  const source = typeof part === "object" ? part : {};
  const firstKey = config.keys[0];
  const secondKey = config.keys[1];
  const first = Number(source[firstKey]);
  const second = Number(source[secondKey]);
  const hasCounts = Number.isFinite(first) && Number.isFinite(second);
  const legacyEarned = Number(source.earned);
  const legacyMax = Number(source.max);
  const legacyCorrect = Number(source.correct);
  const legacyTotal = Number(source.total);
  const pctRaw = Number(source.pct);
 
  let normalized = null;
  if(hasCounts){
    normalized = {
      [firstKey]: first,
      [secondKey]: second,
      pct: second > 0 ? normalizePct((first / second) * 100) : null
     };
  }else if(Number.isFinite(legacyEarned) && Number.isFinite(legacyMax)){
    normalized = {
      [firstKey]: legacyEarned,
      [secondKey]: legacyMax,
      pct: legacyMax > 0 ? normalizePct((legacyEarned / legacyMax) * 100) : null
    };
  }else if(Number.isFinite(legacyCorrect) && Number.isFinite(legacyTotal)){
    normalized = {
      [firstKey]: legacyCorrect,
      [secondKey]: legacyTotal,
      pct: legacyTotal > 0 ? normalizePct((legacyCorrect / legacyTotal) * 100) : null
    };
  }else if(Number.isFinite(pctRaw)){
    normalized = { [firstKey]: 0, [secondKey]: 0, pct:normalizePct(pctRaw) };
   }
 
  if(!normalized) return null;
  normalized.pct = normalizePct(normalized.pct);
  return normalized;
}
 
function normalizeLessonBreakdown(rawBreakdown){
  const source = rawBreakdown && typeof rawBreakdown === "object" ? rawBreakdown : {};
  return {
    context: buildBreakdownPart(source.context || source.quickCheck, { keys:["correct", "total"] }),
    argIdentify: buildBreakdownPart(source.argIdentify, { keys:["correct", "total"] }),
    evidenceSupport: buildBreakdownPart(source.evidenceSupport || source.supportEvidence, { keys:["earned", "max"] }),
    evidenceChallenge: buildBreakdownPart(source.evidenceChallenge || source.challengeEvidence, { keys:["earned", "max"] }),
    judgement: buildBreakdownPart(source.judgement, { keys:["earned", "max"] })
  };
 }

function readDrillHistory(){

}
 
function saveDrillHistory(history){

 }
 
function getDrillHistoryEntry(scopeKey){
  if(!scopeKey) return null;
  const history = readDrillHistory();
  const entry = history[scopeKey];
  return entry && typeof entry === "object" ? entry : null;
}
 
function storeDrillHistory(scopeKey, payload){
  if(!scopeKey || !payload || typeof payload !== "object") return;
  const history = readDrillHistory();
  const current = history[scopeKey] && typeof history[scopeKey] === "object" ? history[scopeKey] : {};
  const priorBest = Number.isFinite(current.bestDrillScore) ? Number(current.bestDrillScore) : null;
  const incomingScore = Number.isFinite(payload.lastDrillScore) ? Number(payload.lastDrillScore) : null;
  const bestDrillScore = incomingScore == null
    ? priorBest
    : (priorBest == null ? incomingScore : Math.max(priorBest, incomingScore));
 
  history[scopeKey] = {
    ...current,
    ...payload,
    bestDrillScore
  };
  saveDrillHistory(history);
}
 
function blendLessonAndDrillPct(lessonAvgPct, drillPct){
  if(!Number.isFinite(lessonAvgPct) && !Number.isFinite(drillPct)) return null;
  if(!Number.isFinite(lessonAvgPct)) return Math.round(drillPct);
  if(!Number.isFinite(drillPct)) return Math.round(lessonAvgPct);
  return Math.round((lessonAvgPct * 0.8) + (drillPct * 0.2));
}
 
function roundToFiveScale(percent){
  if(!Number.isFinite(percent)) return null;
  const clamped = Math.max(0, Math.min(100, Number(percent)));
  return Math.round((clamped / 100) * 5);
}

function markLessonResult(lessonId, scorePct, breakdown, options={}){

function getTopicLessons(topic){
  if(!topic || !Array.isArray(topic.themes)) return [];
  const lessons = topic.themes.flatMap(theme=>Array.isArray(theme.lessons) ? theme.lessons : []);
  if(topic.id !== "t4") return lessons;
 
  const parseYearRange = (label="")=>{
    const years = String(label).match(/\d{4}/g) || [];
    if(!years.length) return { start:Number.POSITIVE_INFINITY, end:Number.POSITIVE_INFINITY };
    const start = Number(years[0]);
    const end = Number(years[years.length - 1]);
    return {
      start:Number.isFinite(start) ? start : Number.POSITIVE_INFINITY,
      end:Number.isFinite(end) ? end : Number.POSITIVE_INFINITY
    };
  };

  return lessons
    .map((lesson, index)=>({ lesson, index, range:parseYearRange(lesson?.yearLabel) }))
    .sort((a,b)=>{
      if(a.range.start !== b.range.start) return a.range.start - b.range.start;
      if(a.range.end !== b.range.end) return a.range.end - b.range.end;
      return a.index - b.index;
    })
    .map(item=>item.lesson);
}

function isLessonTaskCompleted(lessonId, slide){

  const slideId = slide?.slideId;
  if(!lessonId || !slideId) return false;
  if(type === "quick-check") return getStoredQuickCheckAnswer(lessonId, slideId) !== null;
  if(type === "arg-identify") return getStoredArgIdentifyState(lessonId, slideId).checked;
  if(type === "evidence-select") return getStoredEvidenceSelectState(lessonId, slideId).checked;
  if(type === "judgement"){
    const state = getStoredJudgementState(lessonId, slideId);
    return state.optionChecked && state.evidenceChecked;
  }
  if(type === "strongest-evidence") return getStoredStrongestEvidenceState(lessonId, slideId).checked;
  if(type === "rank-factors") return getStoredRankFactorsState(lessonId, slideId).checked;
  if(type === "build-answer") return getStoredBuildAnswerChecked(lessonId, slideId);
  return true;
 }
 
const RECOMMENDED_THEME_ORDER = [

function parseAttemptMs(entry){
  if(!entry || typeof entry !== "object") return null;
  if(Number.isFinite(entry.lastStartedAt)) return entry.lastStartedAt;
  if(typeof entry.lastAttemptDate === "string"){
    const parsed = Date.parse(entry.lastAttemptDate);
    if(Number.isFinite(parsed)) return parsed;
   }
  return null;
 }
 
function isLessonDue(entry, now=Date.now()){
  if(!entry || typeof entry !== "object") return false;
  if(entry.dueForReview === true) return true;
  const attemptMs = typeof entry.lastAttemptDate === "string" ? Date.parse(entry.lastAttemptDate) : parseAttemptMs(entry);
  const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
  const staleAttempt = Number.isFinite(attemptMs) && (now - attemptMs) > sevenDaysMs;
  const lowScore = Number.isFinite(entry.lastScorePct) && entry.lastScorePct < 65;
  return staleAttempt || lowScore;
 }
 

function getLessonStatus(entry){
  if(!entry || typeof entry !== "object") return "Not started";
  const hasAttemptDate = typeof entry.lastAttemptDate === "string";
  if(!hasAttemptDate) return "Not started";
  if(isLessonDue(entry)) return "Due";
  if(entry.completion === true || entry.completed === true) return "Completed";
  return "In progress";
 }
 
function getLessonCta(status){

  if(status === "Completed") return "Review";
  if(status === "Due") return "Review now";

 }
 
function formatLessonDate(dateIso){

 }
 
function getRecommendedNext(topicId){
  const topic = lessonsData.find(t=>t.id===topicId);
  if(!topic) return null;
 
  const byLesson = getLessonActivityStore().byLesson || {};
  const themeMap = new Map((Array.isArray(topic.themes) ? topic.themes : []).map(theme=>[theme.id, theme]));
  const orderedThemes = [
    ...RECOMMENDED_THEME_ORDER.map(id=>themeMap.get(id)).filter(Boolean),
    ...Array.from(themeMap.values()).filter(theme=>!RECOMMENDED_THEME_ORDER.includes(theme.id))
  ];
  const topicDrill = getDrillHistoryEntry(`topic:${topicId}`);
  const lastDrillScore = Number.isFinite(topicDrill?.lastDrillScore) ? Number(topicDrill.lastDrillScore) : null;
 
  const getWeakDrillReason = ()=>{
    if(!topicDrill?.breakdown || typeof topicDrill.breakdown !== "object") return null;
    const candidates = [
      { key:"argIdentify", label:"Argument identification" },
      { key:"evidenceSelect", label:"Evidence selection" },
      { key:"judgement", label:"Judgement" }
    ].map(item=>{
      const pct = Number(topicDrill.breakdown?.[item.key]?.pct);
      return { ...item, pct:Number.isFinite(pct) ? pct : null };
    }).filter(item=>item.pct !== null).sort((a,b)=>a.pct-b.pct);
    if(!candidates.length) return null;
    const weakest = candidates[0];
    return `Your drill suggests ${weakest.label} is still weak (${weakest.pct}%).`;
  };

  if(lastDrillScore !== null && lastDrillScore < 3){
    let weakTheme = null;
    for(const metric of [
      { key:"interpretationPct", label:"Interpretation mastery" },
      { key:"judgementPct", label:"Judgement mastery" },
      { key:"contextPct", label:"Context mastery" }
    ]){
      const candidates = orderedThemes
        .map(theme=>({ theme, mastery:computeThemeMastery(topicId, theme.id) }))
        .filter(({ theme })=>Array.isArray(theme.lessons) && theme.lessons.length);
      if(!candidates.length) continue;
      const ranked = candidates.sort((a,b)=>{
        const av = Number.isFinite(a.mastery?.[metric.key]) ? a.mastery[metric.key] : 101;
        const bv = Number.isFinite(b.mastery?.[metric.key]) ? b.mastery[metric.key] : 101;
        if(av !== bv) return av - bv;
        return orderedThemes.findIndex(t=>t.id===a.theme.id) - orderedThemes.findIndex(t=>t.id===b.theme.id);
      });
      if(ranked.length){
        weakTheme = ranked[0].theme;
        break;
      }
    }

    if(weakTheme){
      const fallbackLesson = (weakTheme.lessons || []).map(lesson=>{
        const entry = normalizeLessonProgressEntry(byLesson[lesson.id]) || {};
        const score = Number.isFinite(entry.lastScorePct) ? entry.lastScorePct : 0;
        return { lesson, score };
      }).sort((a,b)=>a.score - b.score)[0];
      if(fallbackLesson){
        return {
          type:"theme",
          topicId,
          themeId:weakTheme.id,
          lessonId:fallbackLesson.lesson.id,
          title:fallbackLesson.lesson.title,
          reason:getWeakDrillReason() || `Recent drill score was ${lastDrillScore}/5, so targeted practice is recommended.`
        };
      }
    }
   }
 
  for(const theme of orderedThemes){
    const lessons = Array.isArray(theme.lessons) ? theme.lessons : [];
    for(const lesson of lessons){
      const entry = normalizeLessonProgressEntry(byLesson[lesson.id]) || null;
      if(isLessonDue(entry)){
        return {
          type:"lesson",
          topicId,
          themeId:theme.id,
          lessonId:lesson.id,
          title:lesson.title,
          reason:"This lesson is due for review."
        };
      }
    }
  }
 
  for(const theme of orderedThemes){
    const lessons = Array.isArray(theme.lessons) ? theme.lessons : [];
    if(!lessons.length) continue;
    const unfinished = lessons.find(lesson=>{
      const entry = normalizeLessonProgressEntry(byLesson[lesson.id]);
      return !entry || entry.completed !== true;
    });
    if(unfinished){
      return {
        type:"lesson",
        topicId,
        themeId:theme.id,
        lessonId:unfinished.id,
        title:unfinished.title,
        reason:`This is the next unfinished lesson in ${theme.title}.`
      };
    }
  }

  const allLessons = getTopicLessons(topic);
  if(!allLessons.length) return null;

  const masteryPriority = [
    { key:"interpretationPct", label:"Interpretation mastery" },
    { key:"judgementPct", label:"Judgement mastery" },
    { key:"contextPct", label:"Context mastery" }
  ];

  let selectedTheme = null;
  let selectedMetric = masteryPriority[0];
  for(const metric of masteryPriority){
    const candidates = orderedThemes
      .map(theme=>({ theme, mastery:computeThemeMastery(topicId, theme.id) }))
      .filter(({ theme })=>Array.isArray(theme.lessons) && theme.lessons.length);
    if(!candidates.length) continue;
    const withScores = candidates.filter(item=>Number.isFinite(item.mastery?.[metric.key]));
    const ranked = (withScores.length ? withScores : candidates)
      .sort((a,b)=>{
        const av = Number.isFinite(a.mastery?.[metric.key]) ? a.mastery[metric.key] : 101;
        const bv = Number.isFinite(b.mastery?.[metric.key]) ? b.mastery[metric.key] : 101;
        if(av !== bv) return av - bv;
        return orderedThemes.findIndex(t=>t.id===a.theme.id) - orderedThemes.findIndex(t=>t.id===b.theme.id);
      });
    if(ranked.length){
      selectedTheme = ranked[0].theme;
      selectedMetric = metric;
      break;
    }
   }
 
  if(!selectedTheme) selectedTheme = orderedThemes.find(theme=>Array.isArray(theme.lessons) && theme.lessons.length) || null;
  if(!selectedTheme) return null;
 
  const fallbackLesson = (selectedTheme.lessons || []).map(lesson=>{
    const entry = normalizeLessonProgressEntry(byLesson[lesson.id]) || {};
    const score = Number.isFinite(entry.lastScorePct) ? entry.lastScorePct : 0;
    return { lesson, score };
  }).sort((a,b)=>a.score - b.score)[0];
 
  if(!fallbackLesson) return null;
  const selectedMastery = computeThemeMastery(topicId, selectedTheme.id);
  const masteryPct = Number.isFinite(selectedMastery?.[selectedMetric.key]) ? selectedMastery[selectedMetric.key] : null;
  const forwardReason = lastDrillScore !== null && lastDrillScore >= 4
    ? `Your recent drill score was strong (${lastDrillScore}/5), so move forward in the pathway.`
    : null;
 
   return {
    type:"theme",
    topicId,
    themeId:selectedTheme.id,
    lessonId:fallbackLesson.lesson.id,
    title:fallbackLesson.lesson.title,
    reason:forwardReason || (masteryPct == null
      ? `Your ${selectedMetric.label} is weakest in this theme.`
      : `Your ${selectedMetric.label} is lowest here (${masteryPct}%).`)
   };
 }
 
function launchLessonFromTopic(topic, lessonId, preferResume=true){
  if(!topic || !lessonId) return false;
  const topicThemes = Array.isArray(topic.themes) ? topic.themes : [];
  const matchedTheme = topicThemes.find(theme=>Array.isArray(theme.lessons) && theme.lessons.some(lesson=>lesson.id===lessonId));
  if(!matchedTheme) return false;
  lessonsNav.topicId = topic.id;
  return openLesson(lessonId, matchedTheme.id);
 }
 
function openRecommendedLessonForTopic(topicId){
  const topic = lessonsData.find(t=>t.id===topicId);
  if(!topic || !isTopicEnabled(topic.id)) return false;
  const recommended = getRecommendedNext(topic.id);
  if(recommended?.lessonId) return launchLessonFromTopic(topic, recommended.lessonId);
  const fallbackLesson = getTopicLessons(topic)[0] || null;
  if(!fallbackLesson) return false;

 }

  lessonsNav.lessonId = lessonId;
  lessonsNav.selectedOptionIndex = null;
  lessonsNav.view = "player";
  renderLessons();
  return true;
 }
 
function hashSeed(str){
  let h = 2166136261;
  const text = String(str || "seed");
  for(let i=0;i<text.length;i++){
    h ^= text.charCodeAt(i);
    h = Math.imul(h, 16777619);
   }
  return h >>> 0;
 }
 
function mulberry32(seed){
  let t = seed >>> 0;
  return function(){
    t += 0x6D2B79F5;
    let x = t;
    x = Math.imul(x ^ (x >>> 15), x | 1);
    x ^= x + Math.imul(x ^ (x >>> 7), x | 61);
    return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
  };
 }
 
function stableShuffle(list, seedStr){
  const seed = hashSeed(seedStr);
  const rand = mulberry32(seed);
  const arr = (Array.isArray(list) ? list : []).map((v,i)=>({ v, i }));
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(rand() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.map(x=>x.v);
 }
 
function getOrCreateShuffleOrder(key, length, seedStr){
  if(!Number.isInteger(length) || length <= 1) return [...Array(Math.max(length || 0, 0)).keys()];
  try{
    const stored = JSON.parse(localStorage.getItem(key) || "null");
    if(stored && Array.isArray(stored) && stored.length===length) return stored;
  }catch(_err){}
  const order = stableShuffle([...Array(length).keys()], seedStr);
  try{ localStorage.setItem(key, JSON.stringify(order)); }catch(_err){}
  return order;
 }
 
function balanceOptionLengths(options, seedKey){
  if(!Array.isArray(options) || options.length < 2) return Array.isArray(options) ? [...options] : [];
  const lengths = options.map(opt=>String(opt || "").trim().length);
  const maxLen = Math.max(...lengths, 0);
  if(maxLen < 60) return [...options];
 
  const minTarget = Math.floor(maxLen * 0.78);
  const fillers = [
    " in this context.",
    " in this period.",
    " at least in the short term.",
    " for most people at the time.",
    " in the immediate situation."
   ];
 
  return options.map((rawText, idx)=>{
    let text = String(rawText || "").trim();
    if(!text) return text;
    let guard = 0;
    while(text.length < minTarget && guard < 4){
      const fillerIdx = hashSeed(`${seedKey}:${idx}:${guard}`) % fillers.length;
      const suffix = fillers[fillerIdx];
      if(text.endsWith(".")) text = text.slice(0, -1);
      text = `${text},${suffix}`.replace(/,\s+/g, " ").replace(/\s+/g, " ").trim();
      guard += 1;
     }
    return text;
   });
}
 
function getShuffledSlideData(lesson, slide, slideIndex=0){
  if(!slide || !lesson) return { ...slide };
  const slideId = slide?.slideId || slideIndex;
  const slideKey = `${lesson.id}::${slideId}::${slide.type}`;
 
  if(slide.type === "quick-check" || slide.type === "arg-identify"){
    const options = Array.isArray(slide.options) ? slide.options : [];
    const order = getOrCreateShuffleOrder(`LS_SHUF_${slideKey}_opts`, options.length, slideKey);
    const shuffledOptions = balanceOptionLengths(order.map(idx=>options[idx]), `${slideKey}::opts`);
    const remappedFeedback = Array.isArray(slide.feedback) ? order.map(idx=>slide.feedback[idx]) : slide.feedback;
    const remappedCorrectIndex = order.indexOf(slide.correctIndex);
    return {
      ...slide,
      options:shuffledOptions,
      feedback:remappedFeedback,
      correctIndex:Number.isInteger(remappedCorrectIndex) && remappedCorrectIndex >= 0 ? remappedCorrectIndex : slide.correctIndex,
      optionIndexMap:order,
      originalCorrectIndex:slide.correctIndex
    };
   }
 
  if(slide.type === "evidence-select"){
    const statements = Array.isArray(slide.statements) ? slide.statements : [];
    const order = getOrCreateShuffleOrder(`LS_SHUF_${slideKey}_stmts`, statements.length, slideKey);
    return { ...slide, statements:order.map(idx=>statements[idx]) };
   }
 
  if(slide.type === "strongest-evidence"){
    const statements = Array.isArray(slide.statements) ? slide.statements : [];
    const order = getOrCreateShuffleOrder(`LS_SHUF_${slideKey}_stmts`, statements.length, slideKey);
    const shuffled = order.map(idx=>statements[idx]);
    return { ...slide, statements:shuffled, correctId:slide.correctId };
   }
 
  if(slide.type === "rank-factors"){
    const items = Array.isArray(slide.items) ? slide.items : [];
    const order = getOrCreateShuffleOrder(`LS_SHUF_${slideKey}_items`, items.length, slideKey);
    return { ...slide, items:order.map(idx=>items[idx]) };
  }
 
  if(slide.type === "judgement"){
    const options = Array.isArray(slide.options) ? slide.options : [];
    const optionOrder = getOrCreateShuffleOrder(`LS_SHUF_${slideKey}_opts`, options.length, `${slideKey}::opts`);
    const evidenceStatements = Array.isArray(slide.evidencePick?.statements) ? slide.evidencePick.statements : [];
    const evidenceOrder = getOrCreateShuffleOrder(`LS_SHUF_${slideKey}_stmts`, evidenceStatements.length, `${slideKey}::stmts`);
    const remappedBestIndex = optionOrder.indexOf(slide.bestIndex);
    return {
      ...slide,
      options:balanceOptionLengths(optionOrder.map(idx=>options[idx]), `${slideKey}::judgement`),
      bestIndex:Number.isInteger(remappedBestIndex) && remappedBestIndex >= 0 ? remappedBestIndex : slide.bestIndex,
      evidencePick:{
        ...(slide.evidencePick || {}),
        statements:evidenceOrder.map(idx=>evidenceStatements[idx])
      }
    };
  }
  return { ...slide };
 }

function computeThemeMastery(topicId, themeId){
  const topic = lessonsData.find(t=>t.id===topicId);
  const theme = topic?.themes?.find(th=>th.id===themeId);
  const lessons = Array.isArray(theme?.lessons) ? theme.lessons : [];
  const totalLessons = lessons.length;
  const contextValues = [];
  const interpretationValues = [];
  const judgementValues = [];
  let lessonsWithData = 0;
 
  lessons.forEach(lesson=>{
    const progress = getLessonProgress(lesson.id);
    if(!progress) return;
    const breakdown = progress.breakdown || {};
    const contextPct = Number.isFinite(breakdown.context?.pct) ? breakdown.context.pct : null;
    const argPct = Number.isFinite(breakdown.argIdentify?.pct) ? breakdown.argIdentify.pct : null;
    const supportPct = Number.isFinite(breakdown.evidenceSupport?.pct) ? breakdown.evidenceSupport.pct : null;
    const challengePct = Number.isFinite(breakdown.evidenceChallenge?.pct) ? breakdown.evidenceChallenge.pct : null;
    const judgementPct = Number.isFinite(breakdown.judgement?.pct) ? breakdown.judgement.pct : null;
 
    if(contextPct !== null) contextValues.push(contextPct);
    const interpretationParts = [argPct, supportPct, challengePct].filter(v=>Number.isFinite(v));
    if(interpretationParts.length){
      const avg = interpretationParts.reduce((sum, v)=>sum + v, 0) / interpretationParts.length;
      interpretationValues.push(avg);
    }
    if(judgementPct !== null) judgementValues.push(judgementPct);
 
    if(contextPct !== null || interpretationParts.length || judgementPct !== null) lessonsWithData += 1;
  });
 
  const avgOrNull = (arr)=>arr.length ? Math.round(arr.reduce((sum,v)=>sum+v,0)/arr.length) : null;

  const lessonContextPct = avgOrNull(contextValues);
  const lessonInterpretationPct = avgOrNull(interpretationValues);
  const lessonJudgementPct = avgOrNull(judgementValues);
  const themeDrill = getDrillHistoryEntry(`theme:${topicId}:${themeId}`);
  const topicDrill = getDrillHistoryEntry(`topic:${topicId}`);
  const drillSource = themeDrill || topicDrill || {};
  const drillArgPct = Number(drillSource?.breakdown?.argIdentify?.pct);
  const drillEvidencePct = Number(drillSource?.breakdown?.evidenceSelect?.pct);
  const interpretationDrillParts = [drillArgPct, drillEvidencePct].filter(Number.isFinite);
  const drillInterpretationPct = interpretationDrillParts.length
    ? Math.round(interpretationDrillParts.reduce((sum,v)=>sum+v,0) / interpretationDrillParts.length)
    : null;
  const drillJudgementPct = Number.isFinite(Number(drillSource?.breakdown?.judgement?.pct))
    ? Number(drillSource.breakdown.judgement.pct)
    : null;
 
   return {
    contextPct: lessonContextPct,
    interpretationPct: blendLessonAndDrillPct(lessonInterpretationPct, drillInterpretationPct),
    judgementPct: blendLessonAndDrillPct(lessonJudgementPct, drillJudgementPct),
    lessonsWithData,
    totalLessons
   };
 }
 
function getThemeProgress(topic, theme){
  const themeLessons = Array.isArray(theme?.lessons) ? theme.lessons : [];
  const totalLessons = themeLessons.length;
  const lessonIds = new Set(themeLessons.map(lesson=>lesson.id));
  const store = getLessonActivityStore();
  const byLesson = store.byLesson && typeof store.byLesson === "object" ? store.byLesson : {};
  const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
  const now = Date.now();
  let completedLessons = 0;
  let attemptedLessons = 0;
  let dueLessons = 0;
 
  Object.entries(byLesson).forEach(([lessonId, rawEntry])=>{
    const entry = normalizeLessonProgressEntry(rawEntry);
    if(!lessonIds.has(lessonId) || !entry) return;
    const hasAttempt = Number.isFinite(entry.lastStartedAt) || Number.isFinite(entry.bestScorePct) || entry.completed === true;
    if(!hasAttempt) return;
    attemptedLessons += 1;
    if(entry.completed === true) completedLessons += 1;
 
    const staleAttempt = Number.isFinite(entry.lastStartedAt) && (now - entry.lastStartedAt) > sevenDaysMs;
    const lowScore = Number.isFinite(entry.bestScorePct) && entry.bestScorePct < 65;
    if(entry.dueForReview === true || staleAttempt || lowScore) dueLessons += 1;
  });
 
  return { totalLessons, completedLessons, attemptedLessons, dueLessons };
 }
 
function getThemeStatus(progress, mastery){
  if(progress.dueLessons > 0) return { label:"Due for review", cta:"Review now" };
  if(progress.totalLessons > 0 && progress.completedLessons === progress.totalLessons){
    const interpretationLow = Number.isFinite(mastery?.interpretationPct) && mastery.interpretationPct < 65;
    const judgementLow = Number.isFinite(mastery?.judgementPct) && mastery.judgementPct < 65;
    if(interpretationLow || judgementLow) return { label:"Completed", cta:"Improve exam skills" };
    return { label:"Completed", cta:"Review" };
  }
  const hasContext = Number.isFinite(mastery?.contextPct);
  const interpretationMissing = mastery?.interpretationPct == null;
  if(hasContext && interpretationMissing) return { label:"In progress", cta:"Try Exam+" };
  if(progress.attemptedLessons > 0) return { label:"In progress", cta:"Continue" };
  return { label:"Not started", cta:"Start" };
 }

function extractFactorLabel(text, fallback){
  const raw = String(text || "").trim();
  if(!raw) return fallback;
 
  const parts = raw.split(":").map(part=>part.trim()).filter(Boolean);
  const firstPart = parts[0] || "";
  const latterParts = parts.slice(1).join(": ").trim();
  const isGenericPrefix = /^micro-briefing\s*\d+$/i.test(firstPart) || /^factor\s*\d+$/i.test(firstPart);

  if(isGenericPrefix && latterParts){
    const concise = latterParts.split(/[–—-]/)[0].trim();
    if(concise && concise.length >= 4 && concise.length <= 90) return concise;
    if(latterParts.length >= 4 && latterParts.length <= 90) return latterParts;
   }
 
  const heading = firstPart;
  if(heading && heading.length >= 4 && heading.length <= 90) return heading;
  if(raw.length >= 4 && raw.length <= 90) return raw;
  return fallback;
 }
 
function deriveSlideSubheading(content, fallback="Key focus"){
  const raw = String(content || "").replace(/\s+/g, " ").trim();
  if(!raw) return fallback;
  const firstSentence = raw.split(/[.!?]/)[0].trim();
  let concise = (firstSentence || raw).replace(/^\W+/, "").trim();
  if(/^(after|before|during|in|by)\b/i.test(concise) && concise.includes(",")){
    concise = concise.slice(concise.indexOf(",") + 1).trim();
  }
  concise = concise.replace(/[?!.]+$/, "").trim();
  if(!concise) return fallback;
  const clipped = concise.length > 64 ? `${concise.slice(0, 61).trimEnd()}…` : concise;
  return `Focus: ${clipped}`;
}
 
function buildRankFactorsSlide(lesson, slideId, sourceLabel){
  const pack = lesson?.contentPack || {};
  const enquiry = (pack.hero?.subtitleLine || lesson?.title || "this lesson enquiry").trim();
  const themeId = getLessonThemeId(lesson?.id);
  const fallbackByTheme = {
    "political-authority":["Leadership and legitimacy", "Reform and concession", "Repression capacity", "Institutions and governance", "War and crisis"],
    "economic-development":["Industry and finance", "Agriculture and food supply", "Transport and logistics", "Living standards", "War impact"],
    "opposition-control":["Opposition organisation", "State repression", "Splits and divisions", "Mass mobilisation", "Army loyalty"],
    "social-cultural":["Urbanisation", "Literacy and ideas", "Class tension", "Rural continuity", "War acceleration"]
  };
  const briefingLabels = (pack.sf?.briefings || []).map((briefing, i)=>extractFactorLabel(briefing.heading, `Factor ${i+1}`));
  const fallbackLabels = fallbackByTheme[themeId] || ["Leadership", "Institutions", "Economy", "Society", "War pressure"];
  const combined = [...briefingLabels, ...fallbackLabels, extractFactorLabel(pack.bigPicture, "State capacity")];
  const unique = [];
  const seen = new Set();
  combined.forEach(label=>{
    const key = String(label || "").toLowerCase();
    if(!key || seen.has(key)) return;
    seen.add(key);
    unique.push(label);
  });
  const labels = unique.slice(0, 5);
  while(labels.length < 5){ labels.push(`Factor ${labels.length + 1}`); }
  const weights = [5, 4, 3, 2, 1];
  const items = labels.map((text, i)=>({
    id:`${slideId}-factor-${i+1}`,
    text,
    weight:weights[i],
    feedback:i < 3
      ? `${text} is a strong factor because it directly helps answer: ${enquiry}`
      : `${text} is relevant, but it is less decisive for: ${enquiry}`
  }));
  return {
    slideId,
    type:"rank-factors",
    heading:sourceLabel,
    prompt:`Rank the three most decisive factors for this question: ${enquiry}`,
    items,
    pickCount:3,
    scoring:{ type:"weighted-top-3" }
  };
}
 
function statementFromSource(statement, prefix=""){
  if(!statement) return null;
  return {
    id:String(statement.id || `${prefix}${hashSeed(JSON.stringify(statement))}`),
    text:String(statement.text || ""),
    strength:Number(statement.score ?? statement.strength ?? 0),
    feedback:String(statement.feedback || "This is true, but evaluate how directly it answers the claim.")
  };
 }
 
function pickDirectBestStatement(statements){
  const sorted = [...statements].sort((a,b)=>(b.strength - a.strength) || (b.text.length - a.text.length));
  return sorted[0]?.id || statements[0]?.id || null;
}
 
function buildStrongestEvidenceFromQuickCheck(lesson, slideId, sourceLabel){
  const pack = lesson?.contentPack || {};
  const support = (pack.interpretations?.A?.evidenceSupport?.statements || []).slice().sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,2).map(s=>statementFromSource(s, `${slideId}-a-s-`));
  const challenge = (pack.interpretations?.A?.evidenceChallenge?.statements || []).slice().sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,1).map(s=>statementFromSource(s, `${slideId}-a-c-`));
  const judgement = (pack.judgement?.evidencePick?.statements || []).slice().sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,1).map(s=>statementFromSource(s, `${slideId}-j-`));
  const irrelevantPool = [...(pack.interpretations?.B?.evidenceChallenge?.statements || []), ...(pack.interpretations?.B?.evidenceSupport?.statements || [])]
    .filter(s=>Number(s?.score || 0) <= 0)
    .map(s=>statementFromSource(s, `${slideId}-irr-`));
  const extraIrrelevant = irrelevantPool[0] || {
    id:`${slideId}-irrelevant-fallback`,
    text:"Industrial output figures from a different decade that are accurate but not directly tied to this claim.",
    strength:0,
    feedback:"Accurate detail, but it is too indirect to be the strongest evidence for this exact claim."
  };
  const statements = [...support, ...challenge, ...judgement, extraIrrelevant].filter(Boolean).slice(0,6);
  const correctId = pickDirectBestStatement(statements);
  return {
    slideId,
    type:"strongest-evidence",
    heading:sourceLabel,
    prompt:"Choose the MOST relevant evidence statement.",
    contextLine:pack.bigPicture || pack.hero?.titleLine || "Evaluate the claim using the most direct evidence.",
    statements,
    correctId,
    feedbackCorrect:"Strong choice: this evidence most directly supports the claim, not just a nearby point.",
    feedbackWrong:"This may be true, but it is less direct. Prioritise evidence that most clearly proves the specific claim."
  };
}
 
function buildStrongestEvidenceFromJudgement(lesson, slideId){
  const pack = lesson?.contentPack || {};
  const statements = (pack.judgement?.evidencePick?.statements || []).map((s,i)=>statementFromSource(s, `${slideId}-j-${i}-`)).filter(Boolean);
  const correctId = pickDirectBestStatement(statements);

  };
}

function buildSlidesFromContentPack(lesson){

    else slides.push(quickCheckFromCheck(`${lessonId}-quick-check`, pack.quickCheck));
  }
 
  const interpretationSlides = (key)=>{
    const interpretation = pack.interpretations?.[key];
    if(!interpretation) return [];
    return [
      { slideId:`${lessonId}-int${key}`, type:"interpretation", heading:`Extract ${key}`, text:interpretation.text },
       {
        slideId:`${lessonId}-int${key}-arg-identify`,

        feedbackWrong:interpretation.argIdentify?.feedbackWrong
       },
       {
        slideId:`${lessonId}-int${key}-evidence-support`,
        type:"evidence-select",
        purpose:"support",
        heading:`Evidence-support ${key}`,
        prompt:`Choose ${interpretation.evidenceSupport?.selectionLimit ?? 3} specific examples that best support Extract ${key}.`,

        slideId:`${lessonId}-int${key}-evidence-challenge`,
        type:"evidence-select",
        purpose:"challenge",
        heading:`Evidence-challenge ${key}`,

        selectionLimit:interpretation.evidenceChallenge?.selectionLimit,
        statements:interpretation.evidenceChallenge?.statements
       }
    ];
  };
 
  const hasInterpretationContent = ["A", "B"].some(key=>{

      text:"You are now moving into Extract A and Extract B. Read each extract carefully, then complete the exam-practice tasks that follow."
    });
  }
 
  slides.push(...interpretationSlides("A"), ...interpretationSlides("B"));
 
  if(pack.judgement){
    if(plan === "B"){
      slides.push(buildStrongestEvidenceFromJudgement(lesson, `${lessonId}-judgement`));
    }else if(plan === "C"){

     }
    slides.push({
      slideId:`${lessonId}-exam-transfer`,

      modelAnswer:buildExamTransferModelAnswer(lesson)
    });
   }
 
  slides.push({ slideId:`${lessonId}-results`, type:"results", heading:"Results" });
  return slides;
}
 
function slideHasContent(slide){
  if(!slide || typeof slide !== "object") return false;
  const hasText = (value)=>typeof value === "string" && value.trim().length > 0;
  const hasItems = (value)=>Array.isArray(value) && value.length > 0;
  const hasReadableItems = (value)=>hasItems(value) && value.some(item=>{
    if(typeof item === "string") return item.trim().length > 0;
    if(item && typeof item === "object") return hasText(item.text) || hasText(item.label) || hasText(item.heading);
    return false;
  });
  if(slide.type === "results") return true;
  if(slide.type === "lesson-context") return hasText(slide.bigPictureContent) || hasText(slide.coreKnowledgeContent);
  if(slide.type === "quick-check" || slide.type === "arg-identify") return hasText(slide.prompt || slide.text) && hasReadableItems(slide.options);
  if(slide.type === "evidence-select") return hasText(slide.prompt) && hasReadableItems(slide.statements);
  if(slide.type === "strongest-evidence") return hasText(slide.prompt) && hasReadableItems(slide.statements);
  if(slide.type === "rank-factors") return hasText(slide.prompt) && hasReadableItems(slide.items);
  if(slide.type === "exam-transfer") return hasText(slide.prompt);
  if(slide.type === "next-steps") return hasText(slide.text);
  if(slide.type === "interpretation" || slide.type === "briefing" || slide.type === "interpretation-intro") return hasText(slide.text);
  if(slide.type === "judgement") return hasText(slide.prompt) && hasReadableItems(slide.options);
  return true;
}
 
function getLessonSlides(lesson){
  if(!lesson) return [];
  const generatedSlides = Array.isArray(lesson.slides) ? lesson.slides : buildSlidesFromContentPack(lesson);
  let rawSlides = [...generatedSlides];
  const hasLessonContextSlide = rawSlides.some(slide=>slide?.type === "lesson-context");
  const hasLegacyContextSlides = rawSlides.some(slide=>slide?.type === "idea" || slide?.type === "briefing");
  if(!hasLessonContextSlide && hasLegacyContextSlides){
    const contextFields = getLessonContextContent(lesson);
    if(contextFields.bigPictureContent || contextFields.coreKnowledgeContent){
      rawSlides = [
        {
          slideId:`${lesson.id}-lesson-context`,
          type:"lesson-context",
          heading:"Lesson context",
          bigPictureContent:contextFields.bigPictureContent,
          coreKnowledgeContent:contextFields.coreKnowledgeContent
        },
        ...rawSlides.filter(slide=>slide?.type !== "idea" && slide?.type !== "briefing")
      ];
     }
   }
  const filteredSlides = rawSlides.filter(slideHasContent);
  const baseSlides = filteredSlides.map((slide, index)=>ensureSlideMeta(slide, index));
  const withResults = baseSlides.some(slide=>slide.type === "results")
    ? baseSlides
    : [...baseSlides, ensureSlideMeta({ type:"results", heading:"Results" }, baseSlides.length)];
 
  let interpretationCount = 0;
  return withResults.map(slide=>{
    const nextSlide = { ...slide };
    if(slide.type === "interpretation") interpretationCount += 1;
    if(!Array.isArray(nextSlide.modes)){
      if(nextSlide.minMode){
        const minIndex = LESSON_MODES.indexOf(nextSlide.minMode);
        nextSlide.modes = minIndex >= 0 ? LESSON_MODES.slice(minIndex) : getDefaultModesForSlide(nextSlide, interpretationCount);
      }else{
        nextSlide.modes = getDefaultModesForSlide(nextSlide, interpretationCount);
       }
    }
    return nextSlide;
  });
}
